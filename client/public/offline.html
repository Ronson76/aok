<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>aok - Offline</title>
  <meta name="theme-color" content="#16a34a" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }
    .container { max-width: 400px; text-align: center; }
    .logo {
      width: 80px; height: 80px; border-radius: 20px;
      background: #16a34a; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: white;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    .status { font-size: 14px; color: #64748b; margin-top: 8px; }
    .retry-btn {
      display: inline-block; padding: 12px 32px;
      background: #16a34a; color: white; border: none;
      border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer; text-decoration: none;
    }
    .retry-btn:hover { background: #15803d; }
    .emergency {
      margin-top: 40px; padding: 20px; border-radius: 12px;
      border: 2px solid #dc2626; background: rgba(220, 38, 38, 0.1);
    }
    .emergency h2 { color: #ef4444; font-size: 18px; margin-bottom: 8px; }
    .emergency p { color: #fca5a5; font-size: 14px; margin-bottom: 16px; }
    .emergency a {
      display: inline-block; padding: 10px 24px;
      background: #dc2626; color: white; border-radius: 8px;
      text-decoration: none; font-weight: 600; font-size: 14px;
    }
    .emergency a:hover { background: #b91c1c; }
    .wifi-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="wifi-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <div class="logo">aok</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may not be available right now.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <p class="status">Your check-in schedule and emergency contacts are still active on our servers.</p>
    
    <div class="emergency">
      <h2>Need Emergency Help?</h2>
      <p>If you're in immediate danger, call emergency services directly.</p>
      <a href="tel:999">Call 999</a>
    </div>
  </div>
</body>
</html>
